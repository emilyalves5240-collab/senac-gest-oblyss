<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>GestãoBlyss</title>
    <link rel="stylesheet" href="estilo/cadastro.css">
</head>

<body>
    <header>
        <div class="container">

            <h1>GestãoBlyss</h1>
            <h2>Cadastro</h2>
        </div>
    </header>

    <main>
        <div class="container">


            <form>
                <div class="bloco">

                        <label for="cadastro_nome">Nome completo:</label>
                        <input id="cadastro_nome" type="text">
                </div>    

                    <div class="bloco">
                        <label for="cadastro_email">E-mail:</label>
                        <input id="cadastro_email" type="email">
                    </div>
                    <div class="bloco">
                        <label for="cadastro_telefone">Telefone:</label>
                        <input id="cadastro_telefone" type="text">
                    </div>

                    <div class="bloco">
                        <label for="cadastro_senha">Senha:</label>
                        <input id="cadastro_senha" type="password">
                    </div>

                    <div class="bloco">
                        <label for="cadastro_senha_confirm">Confirme a senha:</label>
                        <input id="cadastro_senha_confirm" type="password">
                    </div>

                    <div class="bloco">
                        <button type="reset">Limpar</button>
                        <button type="submit">Cadastrar</button>
                    </div>
            </form>
        </div>
    </main>
